<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Footer — #TheVAstory</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

<!-- ============================================================
     FOOTER — paste before </body> in index.html
     ============================================================ -->
<footer id="site-footer">

  <!-- Top shine line -->
  <div class="ft-top-line"></div>

  <!-- Floating particles canvas -->
  <div class="ft-particles" id="ftParticles"></div>

  <!-- Main content -->
  <div class="ft-inner">

    <!-- Monogram -->
    <div class="ft-monogram">
      <div class="ft-mono-ring"></div>
      <div class="ft-mono-ring r2"></div>
      <div class="ft-mono-text">V <span>❤</span> A</div>
    </div>

    <!-- Hashtag -->
    <div class="ft-hashtag">#TheVAstory</div>

    <!-- Date & venue -->
    <div class="ft-date-row">
      <span class="ft-date-item">18 — 19 April, 2026</span>
      <span class="ft-date-gem">◆</span>
      <span class="ft-date-item">Padamnabh Palace, Kota</span>
    </div>

    <!-- Ornament -->
    <div class="ft-ornament">
      <div class="ft-orn-line"></div>
      <div class="ft-orn-diamond">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <polygon points="7,1 13,7 7,13 1,7" stroke="#C9956E" stroke-width="1" fill="rgba(201,149,110,0.15)"/>
          <polygon points="7,3.5 10.5,7 7,10.5 3.5,7" fill="rgba(201,149,110,0.2)"/>
        </svg>
      </div>
      <div class="ft-orn-line"></div>
    </div>

    <!-- Love note -->
    <p class="ft-love-note">
      Made with every ounce of love &amp; a thousand little prayers.<br>
      <em>Thank you for being part of our story.</em>
    </p>

    <!-- Bottom row -->
    <div class="ft-bottom-row">
      <span class="ft-crafted">Crafted with ❤️ by Vipul</span>
      <span class="ft-dot">·</span>
      <span class="ft-copy">© 2026 #TheVAstory</span>
    </div>

  </div>

  <!-- Bottom glow -->
  <div class="ft-bottom-glow"></div>
</footer>


<!-- ============================================================
     STYLES
     ============================================================ -->
<style>
  #site-footer {
    background: linear-gradient(175deg, #120600 0%, #1e0c00 50%, #0d0400 100%);
    position: relative;
    overflow: hidden;
    padding: 5rem 1.5rem 3.5rem;
    text-align: center;
  }

  /* Top shimmer line */
  .ft-top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(201,149,110,0.2) 20%,
      rgba(245,215,142,0.8) 50%,
      rgba(201,149,110,0.2) 80%,
      transparent 100%
    );
    animation: topLineShimmer 4s ease-in-out infinite;
  }

  @keyframes topLineShimmer {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 1;   }
  }

  /* Particles */
  .ft-particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .ft-particle {
    position: absolute;
    border-radius: 50%;
    background: #F5D78E;
    opacity: 0;
    animation: ftParticleDrift linear infinite;
  }

  @keyframes ftParticleDrift {
    0%   { opacity: 0;   transform: translateY(0) scale(0); }
    15%  { opacity: 0.5; transform: translateY(-15px) scale(1); }
    85%  { opacity: 0.2; }
    100% { opacity: 0;   transform: translateY(-80px) scale(0.3); }
  }

  /* Glow bg */
  #site-footer::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 300px at 50% 100%, rgba(201,149,110,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 400px 200px at 50% 50%, rgba(180,100,20,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .ft-inner {
    position: relative;
    z-index: 2;
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.6rem;
  }

  /* Monogram */
  .ft-monogram {
    position: relative;
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 0.5rem;
  }

  .ft-mono-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(201,149,110,0.35);
    animation: monoRingPulse 3s ease-in-out infinite;
  }

  .ft-mono-ring.r2 {
    inset: -10px;
    border-color: rgba(201,149,110,0.15);
    animation-delay: 1s;
    animation-duration: 4s;
  }

  @keyframes monoRingPulse {
    0%, 100% { transform: scale(1);    opacity: 0.6; }
    50%       { transform: scale(1.05); opacity: 1;   }
  }

  .ft-mono-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 300;
    color: #f5e6c8;
    letter-spacing: 0.1em;
    position: relative;
    z-index: 1;
    line-height: 1;
  }

  .ft-mono-text span {
    color: #C9956E;
    font-size: 0.85em;
    animation: heartBeat 2s ease-in-out infinite;
    display: inline-block;
  }

  @keyframes heartBeat {
    0%, 100% { transform: scale(1); }
    15%       { transform: scale(1.3); }
    30%       { transform: scale(1); }
    45%       { transform: scale(1.15); }
    60%       { transform: scale(1); }
  }

  /* Hashtag */
  .ft-hashtag {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(0.9rem, 3vw, 1.3rem);
    font-weight: 400;
    color: #C9956E;
    letter-spacing: 0.12em;
    animation: hashtagGlow 3s ease-in-out infinite;
  }

  @keyframes hashtagGlow {
    0%, 100% { text-shadow: 0 0 20px rgba(201,149,110,0.2); }
    50%       { text-shadow: 0 0 30px rgba(201,149,110,0.5), 0 0 60px rgba(201,149,110,0.2); }
  }

  /* Date row */
  .ft-date-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .ft-date-item {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    font-weight: 300;
    color: #c8b89a;
    letter-spacing: 0.05em;
  }

  .ft-date-gem {
    font-size: 0.4rem;
    color: #C9956E;
    opacity: 0.6;
  }

  /* Ornament */
  .ft-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    width: 100%;
  }

  .ft-orn-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,149,110,0.3));
    max-width: 180px;
  }

  .ft-orn-line + .ft-orn-diamond + .ft-orn-line {
    background: linear-gradient(90deg, rgba(201,149,110,0.3), transparent);
  }

  .ft-orn-diamond { animation: diamondSpin 8s linear infinite; }

  @keyframes diamondSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Love note */
  .ft-love-note {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 300;
    color: rgba(200,184,154,0.55);
    line-height: 1.8;
    max-width: 420px;
  }

  .ft-love-note em {
    color: rgba(200,184,154,0.75);
    font-style: italic;
  }

  /* Bottom row */
  .ft-bottom-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    flex-wrap: wrap;
    justify-content: center;
    padding-top: 0.5rem;
    border-top: 1px solid rgba(201,149,110,0.1);
    width: 100%;
  }

  .ft-crafted,
  .ft-copy {
    font-family: 'Jost', sans-serif;
    font-size: 0.72rem;
    font-weight: 300;
    color: rgba(200,184,154,0.35);
    letter-spacing: 0.08em;
  }

  .ft-dot { color: rgba(201,149,110,0.3); font-size: 0.6rem; }

  /* Bottom glow */
  .ft-bottom-glow {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,149,110,0.4), transparent);
  }

  /* Entry animations */
  .ft-inner > * {
    opacity: 0;
    transform: translateY(14px);
    animation: ftFadeUp 0.7s ease forwards;
  }

  .ft-inner > *:nth-child(1) { animation-delay: 0.1s; }
  .ft-inner > *:nth-child(2) { animation-delay: 0.25s; }
  .ft-inner > *:nth-child(3) { animation-delay: 0.4s; }
  .ft-inner > *:nth-child(4) { animation-delay: 0.55s; }
  .ft-inner > *:nth-child(5) { animation-delay: 0.7s; }
  .ft-inner > *:nth-child(6) { animation-delay: 0.85s; }

  @keyframes ftFadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0);    }
  }
</style>


<!-- ============================================================
     SCRIPT
     ============================================================ -->
<script>
  // Spawn footer particles
  const ftContainer = document.getElementById('ftParticles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'ft-particle';
    const size = Math.random() > 0.6 ? 3 : 2;
    p.style.cssText = `
      left: ${10 + Math.random() * 80}%;
      bottom: ${Math.random() * 40}%;
      width: ${size}px;
      height: ${size}px;
      animation-duration: ${5 + Math.random() * 5}s;
      animation-delay: ${Math.random() * 5}s;
    `;
    ftContainer.appendChild(p);
  }
</script>

</body>
</html>
