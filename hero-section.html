<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vipul & Ambika — #TheVAstory</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blush:   #F2A4B5;
      --petal:   #E8A0B0;
      --lavender:#D9C7E8;
      --peach:   #F5C9B0;
      --gold:    #C9A96E;
      --cream:   #FDF6EE;
      --deep:    #3D2B1F;
      --text:    #5C3D2E;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      overflow-x: hidden;
    }

    /* ═══════════════════════════════
       HERO SECTION
    ═══════════════════════════════ */
    #hero {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(135deg, #FDF6EE 0%, #FEF0F3 40%, #F7EEF9 100%);
    }

    /* ── CONFETTI CANVAS ── */
    #confettiCanvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 16px; /* space between buttons */
      justify-content: center; /* optional */
      flex-wrap: wrap; /* mobile friendly */
    }

    /* ── FLOATING PETALS ── */
    .hero-petals { position: absolute; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; }
    .petal {
      position: absolute;
      width: 10px; height: 14px;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation: petalFall linear infinite;
    }
    .petal:nth-child(1)  { left:5%;   background:#F2A4B5; animation-duration:9s;  animation-delay:0s;   width:8px;  height:12px; }
    .petal:nth-child(2)  { left:15%;  background:#D9C7E8; animation-duration:11s; animation-delay:1.5s; }
    .petal:nth-child(3)  { left:25%;  background:#F5C9B0; animation-duration:8s;  animation-delay:3s;   width:12px; height:16px; }
    .petal:nth-child(4)  { left:38%;  background:#E8A0B0; animation-duration:13s; animation-delay:0.7s; }
    .petal:nth-child(5)  { left:52%;  background:#F2A4B5; animation-duration:10s; animation-delay:2s;   width:9px;  height:13px; }
    .petal:nth-child(6)  { left:63%;  background:#D9C7E8; animation-duration:12s; animation-delay:4s;   }
    .petal:nth-child(7)  { left:74%;  background:#F5C9B0; animation-duration:9s;  animation-delay:1s;   width:11px; height:15px; }
    .petal:nth-child(8)  { left:82%;  background:#E8A0B0; animation-duration:14s; animation-delay:2.5s; }
    .petal:nth-child(9)  { left:90%;  background:#F2A4B5; animation-duration:10s; animation-delay:0.3s; width:8px;  height:12px; }
    .petal:nth-child(10) { left:45%;  background:#D9C7E8; animation-duration:11s; animation-delay:5s;   }
    .petal:nth-child(11) { left:70%;  background:#F5C9B0; animation-duration:8s;  animation-delay:3.5s; width:13px; height:17px; }
    .petal:nth-child(12) { left:20%;  background:#E8A0B0; animation-duration:12s; animation-delay:6s;   }

    @keyframes petalFall {
      0%   { top:-5%; opacity:0;   transform:rotate(0deg)   translateX(0); }
      10%  { opacity:0.7; }
      90%  { opacity:0.5; }
      100% { top:105%; opacity:0;  transform:rotate(540deg) translateX(40px); }
    }

    /* ── CORNER FLORALS ── */
    .corner-floral {
      position: absolute;
      width: 220px; height: 220px;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      animation: cornerReveal 1.2s ease forwards;
    }
    .corner-tl { top:0; left:0;  transform-origin:top left; }
    .corner-tr { top:0; right:0; transform:scaleX(-1); transform-origin:top right; }
    .corner-bl { bottom:0; left:0;  transform:scaleY(-1); transform-origin:bottom left; }
    .corner-br { bottom:0; right:0; transform:scale(-1,-1); transform-origin:bottom right; }
    @keyframes cornerReveal {
      from { opacity:0; transform:scale(0.7); }
      to   { opacity:1; transform:scale(1); }
    }
    .corner-tr { animation-delay:0.2s; }
    .corner-bl { animation-delay:0.3s; }
    .corner-br { animation-delay:0.4s; }
    /* fix transform-origin for flipped corners */
    .corner-tr { transform:scaleX(-1); }
    .corner-bl { transform:scaleY(-1); }
    .corner-br { transform:scale(-1,-1); }

    /* ═══════════════════════════════
       LEFT — TEXT SIDE
    ═══════════════════════════════ */
    .hero-content {
      padding: 80px 48px 80px 72px;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: center;
    }

    .hero-pre {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.8s 0.3s ease forwards;
    }

    .hero-names {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3rem, 5.5vw, 4.8rem);
      color: var(--deep);
      line-height: 1.1;
      margin-bottom: 8px;
      opacity: 0;
      transform: translateY(30px);
      animation: slideUp 0.9s 0.5s ease forwards;
    }

    .hero-hashtag {
      font-family: 'Montserrat', sans-serif;
      font-size: 30px;
      letter-spacing: 4px;
      color: var(--petal);
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.8s 0.7s ease forwards;
    }

    .hero-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeIn 0.8s 0.9s ease forwards;
    }
    .hero-divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blush), transparent);
      max-width: 80px;
    }
    .hero-divider-icon {
      color: var(--gold);
      font-size: 16px;
    }

    .hero-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1rem, 1.5vw, 1.2rem);
      color: var(--text);
      line-height: 1.75;
      margin-bottom: 36px;
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.9s 1.1s ease forwards;
      max-width: 380px;
    }

    .hero-date-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 36px;
      opacity: 0;
      transform: translateY(16px);
      animation: slideUp 0.8s 1.25s ease forwards;
    }
    .hero-date-badge {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--deep);
      border: 1px solid rgba(201,169,110,0.4);
      border-radius: 30px;
      padding: 8px 20px;
      background: rgba(255,255,255,0.6);
    }
    .hero-date-dot { width:4px; height:4px; border-radius:50%; background:var(--gold); opacity:0.5; }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, #D4748A, #C9A96E);
      padding: 14px 34px;
      border-radius: 40px;
      text-decoration: none;
      opacity: 0;
      transform: translateY(16px);
      animation: slideUp 0.8s 1.4s ease forwards;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 8px 28px rgba(212,116,138,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 36px rgba(212,116,138,0.45);
    }
    .btn-primary::after { content:'→'; font-size:14px; transition:transform 0.3s; }
    .btn-primary:hover::after { transform:translateX(4px); }

    /* scroll hint */
    .scroll-hint {
      position: absolute;
      bottom: 32px; left: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s 2s ease forwards;
    }
    .scroll-hint span {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
    }
    .scroll-arrow {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: scrollPulse 1.8s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%,100% { transform:scaleY(1); opacity:0.6; }
      50%      { transform:scaleY(0.6); opacity:1; }
    }

    /* ═══════════════════════════════
       RIGHT — IMAGE SIDE
    ═══════════════════════════════ */
    .hero-image-side {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 10;
    }

    /* soft gradient fade on left edge so image blends into text side */
    .hero-image-side::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 120px; height: 100%;
      background: linear-gradient(to right, #FEF0F3, transparent);
      z-index: 5;
      pointer-events: none;
    }

    /* subtle vignette on right + bottom */
    .hero-image-side::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(253,246,238,0.25) 0%, transparent 30%, transparent 70%, rgba(253,246,238,0.4) 100%),
        linear-gradient(to right,  transparent 70%, rgba(247,238,249,0.3) 100%);
      z-index: 5;
      pointer-events: none;
    }

    .hero-img-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      opacity: 0;
      transform: scale(1.05) translateX(30px);
      animation: imgReveal 1.2s 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    @keyframes imgReveal {
      to { opacity:1; transform:scale(1) translateX(0); }
    }

    .hero-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* position focus on faces — upper portion of image */
      object-position: center 20%;
      display: block;
    }

    /* floating frame accent behind image */
    .img-frame-accent {
      position: absolute;
      top: 40px; right: 40px;
      bottom: 40px; left: 60px;
      border: 1px solid rgba(201,169,110,0.3);
      border-radius: 4px;
      pointer-events: none;
      z-index: 6;
      opacity: 0;
      animation: fadeIn 1s 1.4s ease forwards;
    }

    /* floating name tag on image */
    .img-tag {
      position: absolute;
      top:50px;
      bottom: 60px;
      right: -200px;
      width:100%;
      z-index: 8;
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.9s 1.8s ease forwards;
    }
    .img-tag-date {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      margin-bottom: 4px;
      padding: 0 30px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.4);
    }
    .img-tag-name {
      font-family: 'Great Vibes', cursive;
      font-size: 2.2rem;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.35);
      line-height: 1;
    }

    /* heart badge */
    .img-heart-badge {
      position: absolute;
      top: 55px;
      right: 48px;
      z-index: 8;
      background: rgba(255,255,255,0.92);
      border-radius: 50%;
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 20px rgba(212,116,138,0.25);
      opacity: 0;
      transform: scale(0.5);
      animation: popIn 0.6s 2s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes popIn {
      to { opacity:1; transform:scale(1); }
    }

    /* ═══════════════════════════════
       SHARED KEYFRAMES
    ═══════════════════════════════ */
    @keyframes slideUp {
      from { opacity:0; transform:translateY(var(--from-y, 24px)); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity:0; }
      to   { opacity:1; }
    }

    /* ═══════════════════════════════
       RESPONSIVE
    ═══════════════════════════════ */
    @media (max-width: 900px) {
      #hero { grid-template-columns: 1fr; grid-template-rows: auto auto; }
      .hero-content { padding: 100px 32px 40px; order: 2; }
      .hero-image-side { height: 55vw; min-height: 320px; order: 1; }
      .hero-image-side::before { display:none; }
      .scroll-hint { left:32px; }
      .corner-tl, .corner-bl { width:140px; height:140px; }
      .corner-tr, .corner-br { width:140px; height:140px; }
    }
    @media (max-width: 540px) {
      .hero-content { padding: 80px 20px 36px; }
      .hero-image-side { height: 70vw; }
      .btn-primary { padding:12px 26px; }
      .img-tag { bottom:24px; top:30px; left:10px }
      .img-heart-badge { top:24px; right:20px; width:44px; height:44px; font-size:18px; }
    }
  </style>
</head>

<script>
/* ═══════════════════════════════════════
   CONFETTI — bursts when page loads
═══════════════════════════════════════ */
(function() {
  const canvas  = document.getElementById('confettiCanvas');
  const ctx     = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = [
    '#F2A4B5','#D9C7E8','#F5C9B0','#E8A0B0',
    '#C9A96E','#F7D6DE','#B5D5F5','#FDEBD0'
  ];

  const pieces = [];
  const TOTAL  = 160;

  class Piece {
    constructor(burst) {
      this.reset(burst);
    }
    reset(burst) {
      // burst from center-top of image side (right half)
      const bx = burst ? window.innerWidth * 0.75 : Math.random() * window.innerWidth;
      const by = burst ? window.innerHeight * 0.3  : -10;
      this.x    = bx + (Math.random() - 0.5) * (burst ? 80 : 0);
      this.y    = by;
      this.vx   = (Math.random() - 0.5) * (burst ? 10 : 2);
      this.vy   = burst ? (Math.random() * -8 - 4) : (Math.random() * 2 + 1);
      this.rot  = Math.random() * 360;
      this.rotV = (Math.random() - 0.5) * 6;
      this.w    = Math.random() * 8 + 5;
      this.h    = Math.random() * 5 + 3;
      this.color= COLORS[Math.floor(Math.random() * COLORS.length)];
      this.alpha= 1;
      this.gravity = 0.18 + Math.random() * 0.1;
      this.shape= Math.random() < 0.4 ? 'circle' : 'rect';
      this.life = burst ? 1 : 0.8 + Math.random() * 0.4;
    }
    update() {
      this.vy  += this.gravity;
      this.x   += this.vx;
      this.y   += this.vy;
      this.rot += this.rotV;
      if (this.y > canvas.height + 20) {
        this.alpha -= 0.04;
      }
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot * Math.PI / 180);
      ctx.fillStyle = this.color;
      if (this.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, this.w / 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
      }
      ctx.restore();
    }
    isDead() { return this.alpha <= 0; }
  }

  // Initial burst
  let burstDone = false;
  function burst() {
    for (let i = 0; i < TOTAL; i++) {
      setTimeout(() => pieces.push(new Piece(true)), i * 8);
    }
    burstDone = true;
  }

  // Gentle ongoing rain after burst
  let rainInterval;
  function startRain() {
    rainInterval = setInterval(() => {
      if (pieces.length < 40) pieces.push(new Piece(false));
    }, 300);
  }

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = pieces.length - 1; i >= 0; i--) {
      pieces[i].update();
      pieces[i].draw();
      if (pieces[i].isDead()) pieces.splice(i, 1);
    }
    requestAnimationFrame(loop);
  }

  // Fire after short delay so page has painted
  setTimeout(burst, 400);
  setTimeout(startRain, 3500);
  loop();
})();
</script>

</body>
</html>
