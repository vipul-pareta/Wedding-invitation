<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RSVP — Vipul & Ambika</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9956E;
      --gold-light: #F5D78E;
      --gold-dim: rgba(201,149,110,0.25);
      --cream: #FDF8F0;
      --dark: #1a0a00;
      --text: #3d2b1f;
      --text-light: #7a5c4a;
      --border: rgba(201,149,110,0.3);
    }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    /* ── Background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 700px 500px at 10% 20%, rgba(201,149,110,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 500px 400px at 90% 80%, rgba(201,149,110,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Section wrapper ── */
    #rsvp {
      width: 100%;
      max-width: 600px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .rsvp-header {
      text-align: center;
      margin-bottom: 2.8rem;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.7s ease forwards 0.1s;
    }

    .rsvp-label {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    .rsvp-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 300;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 1.2rem;
    }

    .rsvp-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .rsvp-ornament-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .rsvp-ornament-line.r {
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .rsvp-ornament-gem {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.7;
    }

    .rsvp-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-style: italic;
      color: var(--text-light);
      letter-spacing: 0.02em;
    }

    /* ── Card ── */
    .rsvp-card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.8rem 2.4rem;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease forwards 0.3s;
    }

    .rsvp-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold-light) 50%, var(--gold) 70%, transparent);
    }

    /* Corner filigree */
    .rsvp-card-corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: rgba(201,149,110,0.4);
      border-style: solid;
    }
    .rsvp-card-corner.tl { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
    .rsvp-card-corner.tr { top: 10px; right: 10px; border-width: 1px 1px 0 0; }
    .rsvp-card-corner.bl { bottom: 10px; left: 10px; border-width: 0 0 1px 1px; }
    .rsvp-card-corner.br { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

    /* ── Form ── */
    .rsvp-form { display: flex; flex-direction: column; gap: 1.4rem; }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s ease forwards;
    }
    .field-group:nth-child(1) { animation-delay: 0.5s; }
    .field-group:nth-child(2) { animation-delay: 0.6s; }
    .field-group:nth-child(3) { animation-delay: 0.7s; }
    .field-group:nth-child(4) { animation-delay: 0.8s; }
    .field-group:nth-child(5) { animation-delay: 0.9s; }
    .field-group:nth-child(6) { animation-delay: 1.0s; }

    .field-label {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.52rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .field-input,
    .field-select,
    .field-textarea {
      width: 100%;
      background: rgba(253,248,240,0.8);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.75rem 1rem;
      font-family: 'Jost', sans-serif;
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--text);
      outline: none;
      transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    .field-input::placeholder,
    .field-textarea::placeholder { color: rgba(122,92,74,0.4); }

    .field-input:focus,
    .field-select:focus,
    .field-textarea:focus {
      border-color: var(--gold);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(201,149,110,0.1);
    }

    .field-textarea { resize: none; min-height: 90px; line-height: 1.6; }

    .field-select-wrap { position: relative; }
    .field-select-wrap::after {
      content: '';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%) rotate(45deg);
      width: 6px;
      height: 6px;
      border-right: 1.5px solid var(--gold);
      border-bottom: 1.5px solid var(--gold);
      pointer-events: none;
    }

    /* ── Attendance toggle ── */
    .attendance-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .attendance-option { display: none; }

    .attendance-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.7rem 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-style: italic;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.25s ease;
      background: rgba(253,248,240,0.6);
      user-select: none;
    }

    .attendance-label:hover {
      border-color: var(--gold);
      color: var(--text);
    }

    .attendance-option:checked + .attendance-label {
      border-color: var(--gold);
      background: rgba(201,149,110,0.1);
      color: var(--text);
    }

    .attendance-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      transition: background 0.25s ease;
      flex-shrink: 0;
    }

    .attendance-option:checked + .attendance-label .attendance-dot {
      background: var(--gold);
    }

    /* Events checkboxes */
    .events-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .event-check-input { display: none; }

    .event-check-label {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.6rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.25s ease;
      background: rgba(253,248,240,0.6);
      user-select: none;
    }

    .event-check-label:hover {
      border-color: var(--gold);
      color: var(--text);
    }

    .event-check-input:checked + .event-check-label {
      border-color: var(--gold);
      background: rgba(201,149,110,0.1);
      color: var(--text);
    }

    .event-check-box {
      width: 14px;
      height: 14px;
      border: 1px solid var(--gold);
      border-radius: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s ease;
    }

    .event-check-input:checked + .event-check-label .event-check-box {
      background: var(--gold);
    }

    .event-check-input:checked + .event-check-label .event-check-box::after {
      content: '';
      display: block;
      width: 4px;
      height: 7px;
      border-right: 1.5px solid #fff;
      border-bottom: 1.5px solid #fff;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    /* ── Two-col row ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 480px) { .two-col { grid-template-columns: 1fr; } }

    /* ── Submit ── */
    .rsvp-submit-wrap {
      text-align: center;
      padding-top: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1.1s;
    }

    .rsvp-submit {
      display: inline-block;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--text);
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 1rem 3rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.35s ease;
      border-radius: 2px;
    }

    .rsvp-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--gold), #e8a87c);
      transform: translateX(-105%);
      transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
      z-index: 0;
    }

    .rsvp-submit:hover::before { transform: translateX(0); }
    .rsvp-submit:hover { color: #fff; }
    .rsvp-submit span { position: relative; z-index: 1; }

    /* ── Success state ── */
    .rsvp-success {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.2rem;
      padding: 2rem 0;
    }

    .rsvp-success.show { display: flex; }

    .success-icon {
      width: 64px;
      height: 64px;
      border: 1px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scaleIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .success-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      color: var(--text);
    }

    .success-msg {
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--text-light);
      line-height: 1.7;
      max-width: 340px;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Divider ── */
    .form-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 0.2rem 0;
    }
  </style>
</head>
<body>

<section id="rsvp">

  <div class="rsvp-header">
    <div class="rsvp-label">Kindly Reply</div>
    <div class="rsvp-title">Will You Join Us?</div>
    <div class="rsvp-ornament">
      <div class="rsvp-ornament-line"></div>
      <div class="rsvp-ornament-gem"></div>
      <div class="rsvp-ornament-line r"></div>
    </div>
    <div class="rsvp-subtitle">Please respond by 10 April, 2026</div>
  </div>

  <div class="rsvp-card">
    <div class="rsvp-card-corner tl"></div>
    <div class="rsvp-card-corner tr"></div>
    <div class="rsvp-card-corner bl"></div>
    <div class="rsvp-card-corner br"></div>

    <!-- Form -->
    <form class="rsvp-form" id="rsvpForm" novalidate>

      <!-- Name -->
      <div class="field-group">
        <label class="field-label" for="fullName">Full Name</label>
        <input class="field-input" id="fullName" type="text" placeholder="Your name" required/>
      </div>

      <!-- Phone + Guests -->
      <div class="two-col">
        <div class="field-group">
          <label class="field-label" for="phone">Phone</label>
          <input class="field-input" id="phone" type="tel" placeholder="+91 XXXXX XXXXX"/>
        </div>
        <div class="field-group">
          <label class="field-label" for="guests">No. of Guests</label>
          <div class="field-select-wrap">
            <select class="field-select" id="guests">
              <option value="1">Just me</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5+">5+</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-divider"></div>

      <!-- Attendance -->
      <div class="field-group">
        <label class="field-label">Attendance</label>
        <div class="attendance-row">
          <div>
            <input class="attendance-option" type="radio" name="attendance" id="attYes" value="yes" checked/>
            <label class="attendance-label" for="attYes">
              <span class="attendance-dot"></span>
              Joyfully Accept
            </label>
          </div>
          <div>
            <input class="attendance-option" type="radio" name="attendance" id="attNo" value="no"/>
            <label class="attendance-label" for="attNo">
              <span class="attendance-dot"></span>
              Regretfully Decline
            </label>
          </div>
        </div>
      </div>

      <!-- Events -->
      <div class="field-group" id="eventsField">
        <label class="field-label">Events Attending</label>
        <div class="events-grid">
          <div>
            <input class="event-check-input" type="checkbox" id="evHaldi" value="haldi" checked/>
            <label class="event-check-label" for="evHaldi">
              <span class="event-check-box"></span>
              Haldi &amp; Mehandi
            </label>
          </div>
          <div>
            <input class="event-check-input" type="checkbox" id="evSangeet" value="sangeet" checked/>
            <label class="event-check-label" for="evSangeet">
              <span class="event-check-box"></span>
              Sangeet
            </label>
          </div>
          <div>
            <input class="event-check-input" type="checkbox" id="evEngagement" value="engagement" checked/>
            <label class="event-check-label" for="evEngagement">
              <span class="event-check-box"></span>
              Engagement
            </label>
          </div>
          <div>
            <input class="event-check-input" type="checkbox" id="evReception" value="reception" checked/>
            <label class="event-check-label" for="evReception">
              <span class="event-check-box"></span>
              Reception
            </label>
          </div>
        </div>
      </div>

      <div class="form-divider"></div>

      <!-- Message -->
      <div class="field-group">
        <label class="field-label" for="message">A Message for the Couple <span style="opacity:0.5;font-size:0.45rem;">(optional)</span></label>
        <textarea class="field-textarea" id="message" placeholder="Share your wishes or blessings…"></textarea>
      </div>

      <!-- Submit -->
      <div class="rsvp-submit-wrap">
        <button class="rsvp-submit" type="submit">
          <span>Send RSVP</span>
        </button>
      </div>

    </form>

    <!-- Success -->
    <div class="rsvp-success" id="rsvpSuccess">
      <div class="success-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <polyline points="6,14 11,19 22,8" stroke="#C9956E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="success-title">Thank You!</div>
      <div class="success-msg">Your RSVP has been received. We cannot wait to celebrate this beautiful occasion with you.</div>
      <div class="rsvp-ornament" style="margin-top:0.5rem;">
        <div class="rsvp-ornament-line" style="width:30px;"></div>
        <div class="rsvp-ornament-gem"></div>
        <div class="rsvp-ornament-line r" style="width:30px;"></div>
      </div>
    </div>

  </div>
</section>

<script>
  // ── PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE ──
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbywZh7sPCqHSBanQ94l3oHWVc6wa6AjfMVd7ZolJ8EXfelWFvVETJEECKHvxUarBnC4wA/exec';

  const form = document.getElementById('rsvpForm');
  const success = document.getElementById('rsvpSuccess');
  const eventsField = document.getElementById('eventsField');
  const submitBtn = document.querySelector('.rsvp-submit');

  // Hide events when declining
  document.querySelectorAll('input[name="attendance"]').forEach(r => {
    r.addEventListener('change', () => {
      eventsField.style.opacity = r.value === 'no' ? '0.35' : '1';
      eventsField.style.pointerEvents = r.value === 'no' ? 'none' : 'auto';
    });
  });

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const name = document.getElementById('fullName').value.trim();
    if (!name) {
      document.getElementById('fullName').focus();
      document.getElementById('fullName').style.borderColor = '#c0392b';
      setTimeout(() => document.getElementById('fullName').style.borderColor = '', 1500);
      return;
    }

    // Collect data
    const data = {
      name,
      phone: document.getElementById('phone').value.trim(),
      guests: document.getElementById('guests').value,
      attendance: document.querySelector('input[name="attendance"]:checked').value,
      events: [...document.querySelectorAll('.event-check-input:checked')].map(c => c.value),
      message: document.getElementById('message').value.trim(),
      submittedAt: new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' })
    };

    // Button loading state
    submitBtn.querySelector('span').textContent = 'Sending…';
    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.7';

    // Save to localStorage as backup
    const existing = JSON.parse(localStorage.getItem('rsvpResponses') || '[]');
    existing.push(data);
    localStorage.setItem('rsvpResponses', JSON.stringify(existing));

    // Send to Google Sheets
    try {
      await fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
    } catch (err) {
      console.warn('Sheet sync failed, saved locally:', err);
    }

    // Show success regardless (no-cors means we can't read response)
    form.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
    form.style.opacity = '0';
    form.style.transform = 'translateY(-10px)';
    setTimeout(() => {
      form.style.display = 'none';
      success.classList.add('show');
    }, 400);
  });
</script>

</body>
</html>
